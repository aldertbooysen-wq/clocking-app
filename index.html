<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="font-family: Arial; text-align:center; padding:20px;">

<h2>📍 Site: SITE A</h2>

<p id="status">Loading...</p>
<p id="offlineCount"></p>

<div id="reader" style="width:300px; margin:auto;"></div>

<div id="result" style="display:none;">
  <h3 id="empDisplay"></h3>
  <button onclick="clock('IN')">CLOCK IN</button>
  <button onclick="clock('OUT')">CLOCK OUT</button>
</div>

<hr>

<h3>Manual Entry</h3>
<input type="text" id="manualEmp" placeholder="Enter EmpNo">
<p id="manualName"></p>

<button onclick="manualClock('IN')">Manual IN</button>
<button onclick="manualClock('OUT')">Manual OUT</button>

<script>

const API = "https://script.google.com/macros/s/AKfycbxFK3iB-nIOnVzBFqt5xI_te_fHCr17ewt5z0m0dvQc6wGFBN-C9KJ3pwziHYJM47j1/exec";

let employees = [];
let empNo = "";
let empName = "";

// =========================
// LOAD EMPLOYEES
// =========================
fetch(API + "?action=employees")
  .then(res => res.json())
  .then(data => {
    employees = data;
    status("Ready ✅");
    startScanner();
    showOfflineCount();
  })
  .catch(() => {
    status("Offline mode ⚠️");
    startScanner();
    showOfflineCount();
  });

// =========================
// CAMERA
// =========================
function startScanner() {
  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).catch(() => status("Camera error ❌"));
}

// =========================
// QR
// =========================
function onScanSuccess(decodedText) {

  let emp = employees.find(e => decodedText.includes(e.empNo));

  if (!emp) return status("Not found ❌");
  if (!emp.active) return status("Inactive ❌");

  empNo = emp.empNo;
  empName = emp.empName;

  document.getElementById("empDisplay").innerText = empNo + " - " + empName;
  document.getElementById("result").style.display = "block";
}

// =========================
// MANUAL
// =========================
document.getElementById("manualEmp").addEventListener("input", function () {
  let val = this.value.toUpperCase();
  let emp = employees.find(e => e.empNo === val);

  document.getElementById("manualName").innerText =
    emp ? emp.empName : "Not found";
});

// =========================
// CLOCK
// =========================
function clock(type) {
  send(empNo, empName, type, "QR");
}

function manualClock(type) {
  let val = document.getElementById("manualEmp").value.toUpperCase();
  let emp = employees.find(e => e.empNo === val);

  if (!emp) return alert("Not found");
  if (!emp.active) return alert("Inactive");

  send(emp.empNo, emp.empName, type, "Manual");
}

// =========================
// SEND (FIXED)
// =========================
function send(empNo, empName, type, method) {

  const payload = { empNo, empName, type, method, site:"Site A", supervisor:"Piet" };

  const url = API +
    "?empNo=" + empNo +
    "&empName=" + encodeURIComponent(empName) +
    "&type=" + type +
    "&site=Site A" +
    "&supervisor=Piet" +
    "&method=" + method;

  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error();
      return res.text();
    })
    .then(res => {

      if (res === "SAVED") {
        alert(type + " saved ✅");
      } else if (res === "BLOCKED") {
        alert("❌ Already " + type);
      } else {
        throw new Error();
      }

    })
    .catch(() => {
      saveOffline(payload);
    });
}

// =========================
// OFFLINE SAVE
// =========================
function saveOffline(data) {

  let q = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
  q.push(data);
  localStorage.setItem("offlineQueue", JSON.stringify(q));

  document.getElementById("offlineCount").innerText =
    "Offline clocks: " + q.length + " ⚠️";

  alert("Saved offline ⚠️");
}

// =========================
// SYNC (FINAL FIX)
// =========================
async function syncOffline() {

  let queue = JSON.parse(localStorage.getItem("offlineQueue") || "[]");

  if (queue.length === 0) {
    document.getElementById("offlineCount").innerText = "All synced ✅";
    return;
  }

  let newQueue = [];

  for (let item of queue) {

    const url = API +
      "?empNo=" + item.empNo +
      "&empName=" + encodeURIComponent(item.empName) +
      "&type=" + item.type +
      "&site=" + item.site +
      "&supervisor=" + item.supervisor +
      "&method=" + item.method;

    try {
      const res = await fetch(url);

      if (!res.ok) throw new Error();

      const text = await res.text();

      if (text !== "SAVED") {
        newQueue.push(item);
      }

    } catch {
      newQueue.push(item);
    }
  }

  localStorage.setItem("offlineQueue", JSON.stringify(newQueue));

  if (newQueue.length > 0) {
    document.getElementById("offlineCount").innerText =
      "Offline clocks: " + newQueue.length + " ⚠️";
  } else {
    document.getElementById("offlineCount").innerText =
      "All synced ✅";
  }
}

// =========================
// STATUS
// =========================
function showOfflineCount() {
  let q = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
  document.getElementById("offlineCount").innerText =
    q.length > 0 ? "Offline clocks: " + q.length + " ⚠️" : "All synced ✅";
}

function status(msg){
  document.getElementById("status").innerText = msg;
}

// 🔥 AUTO SYNC
setInterval(syncOffline, 10000);

</script>

</body>
</html>
