<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Clocking System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .status-box { font-weight: bold; margin: 10px 0; padding: 10px; border-radius: 5px; }
        .ready { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .debug-text { color: red; font-size: 11px; margin-top: 5px; font-family: monospace; }
        button { padding: 15px; width: 80%; margin: 10px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; }
        .btn-in { background-color: #28a745; }
        .btn-out { background-color: #dc3545; }
        #result { display: none; border-top: 2px solid #eee; margin-top: 20px; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 SITE A</h2>
    <div id="status" class="status-box">Loading employees...</div>
    <div id="offlineInfo" style="font-size: 12px; color: gray;"></div>
    
    <div id="reader"></div>
    <div id="debug" class="debug-text"></div>

    <div id="result">
        <h3 id="empDisplay"></h3>
        <button class="btn-in" onclick="sendClock('IN')">CLOCK IN</button>
        <button class="btn-out" onclick="sendClock('OUT')">CLOCK OUT</button>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const API = "https://script.google.com/macros/s/AKfycbxFK3iB-nIOnVzBFqt5xI_te_fHCr17ewt5z0m0dvQc6wGFBN-C9KJ3pwziHYJM47j1/exec";
let employees = [];
let currentEmp = null;

// 1. Load employees
fetch(API + "?action=employees")
    .then(res => res.json())
    .then(data => {
        employees = data;
        updateStatus("System Ready ✅", "ready");
        startScanner();
    })
    .catch(err => {
        updateStatus("Offline Mode ⚠️", "error");
        startScanner();
    });

// 2. Scanner Logic
function startScanner() {
    const scanner = new Html5Qrcode("reader");
    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (text) => {
            let scanned = text.trim();
            document.getElementById("debug").innerText = "Scanned: [" + scanned + "]";

            // Search for employee (Checking if scanned text matches or contains the empNo)
            let emp = employees.find(e => {
                let sheetNo = String(e.empNo).trim().toUpperCase();
                let scanNo = scanned.toUpperCase();
                return scanNo === sheetNo || scanNo.includes(sheetNo);
            });

            if (emp) {
                if (!emp.active) return alert("This employee is inactive!");
                currentEmp = emp;
                document.getElementById("empDisplay").innerText = emp.empNo + " - " + emp.empName;
                document.getElementById("result").style.display = "block";
                updateStatus("Employee Found ✅", "ready");
            } else {
                updateStatus("Not on list: " + scanned, "error");
            }
        }
    ).catch(e => console.error(e));
}

// 3. Send Clock Data
function sendClock(type) {
    if (!currentEmp) return;

    const url = `${API}?empNo=${currentEmp.empNo}&empName=${encodeURIComponent(currentEmp.empName)}&type=${type}&site=Site A&supervisor=Piet&method=QR`;

    fetch(url)
        .then(res => res.text())
        .then(res => {
            if (res === "SAVED") {
                alert("Success: " + type + " saved!");
                location.reload(); 
            } else if (res === "BLOCKED") {
                alert("⚠️ ERROR: Already clocked " + type + "!");
            } else {
                alert("Error: " + res);
            }
        })
        .catch(() => {
            saveOffline(currentEmp, type);
            alert("Saved offline ⚠️");
        });
}

// 4. Offline Handling
function saveOffline(emp, type) {
    let q = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
    q.push({ ...emp, type, site: "Site A", supervisor: "Piet", method: "QR_OFFLINE" });
    localStorage.setItem("offlineQueue", JSON.stringify(q));
    updateOfflineUI();
}

async function syncOffline() {
    let q = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
    if (q.length === 0) return;

    let newQueue = [];
    for (let item of q) {
        const url = `${API}?empNo=${item.empNo}&empName=${encodeURIComponent(item.empName)}&type=${item.type}&site=${item.site}&supervisor=${item.supervisor}&method=${item.method}`;
        try {
            let res = await fetch(url);
            let text = await res.text();
            if (text !== "SAVED" && text !== "BLOCKED") newQueue.push(item);
        } catch {
            newQueue.push(item);
        }
    }
    localStorage.setItem("offlineQueue", JSON.stringify(newQueue));
    updateOfflineUI();
}

function updateStatus(msg, cls) {
    const s = document.getElementById("status");
    s.innerText = msg;
    s.className = "status-box " + cls;
}

function updateOfflineUI() {
    let q = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
    document.getElementById("offlineInfo").innerText = q.length > 0 ? "Waiting for sync: " + q.length : "";
}

setInterval(syncOffline, 20000); 
</script>

</body>
</html>
